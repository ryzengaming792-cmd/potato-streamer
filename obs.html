<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Streamer | OBS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: transparent; /* Allows OBS to use it as transparent if needed */
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: block; /* Override style.css flex layout for this page */
        }
        .video-container {
            margin: 0;
            max-width: none;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="noSignal" class="no-signal">
            <h2>NO SIGNAL</h2>
            <p style="color: var(--val-white); font-size: 24px; margin-top: 10px;">WAITING FOR SENDER</p>
        </div>
    </div>

    <script src="obs.js"></script>
</body>
</html>
