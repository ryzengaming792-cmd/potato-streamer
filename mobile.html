<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Streamer | Mobile</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <script src="shapes.js"></script>
    
    <style>
        /* Hidden elements that we process but don't show */
        .input_video {
            display: none;
        }
        .output_canvas {
            width: 100%;
            height: auto;
            max-width: 100%;
            border: 2px solid var(--val-red);
            border-radius: 4px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>SENDER CONTROL<br><span style="font-size: 1rem; color: var(--val-red); letter-spacing: 4px;">BY RADEON GAMING</span></h2>
    </div>

    <div class="container" style="padding: 10px; padding-bottom: 140px;">
        <video class="input_video" playsinline></video>
        
        <!-- Canvas to draw the filter -->
        <canvas class="output_canvas" width="1080" height="1080" style="margin: 0 auto; display: block;"></canvas>

        <div class="mobile-bottom-bar">
            <h3 id="connectionStatus" class="status disconnected" style="margin: 0 0 10px 0; font-size: 16px;">DISCONNECTED</h3>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="toggleFilterBtn" class="val-btn primary" style="flex: 1; padding: 15px 5px; font-size: 14px;">FILTER (ON)</button>
                <button id="switchCameraBtn" class="val-btn secondary" style="flex: 1; padding: 15px 5px; font-size: 14px;">SWITCH CAM</button>
            </div>
            <button id="connectBtn" class="val-btn" style="width: 100%; margin-top: 10px; padding: 15px; font-size: 14px;">CONNECT TO OBS</button>
        </div>
    </div>

    <!-- Load our script last -->
    <script src="mobile.js"></script>
</body>
</html>
