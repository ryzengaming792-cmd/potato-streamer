<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Streamer | Mobile</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <script src="shapes.js"></script>
    
    <style>
        /* Hidden elements that we process but don't show */
        .input_video {
            display: none;
        }
        .output_canvas {
            width: 100%;
            height: auto;
            max-width: 100%;
            border: 2px solid var(--val-red);
            border-radius: 4px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>SENDER CONTROL<br><span style="font-size: 1rem; color: var(--val-red); letter-spacing: 4px;">BY RADEON GAMING</span></h2>
    </div>

    <div id="calibrationControls" class="hidden" style="background: rgba(15,25,35,0.95); padding: 15px; position: fixed; top: 10px; left: 10px; right: 10px; z-index: 2000; border: 2px solid var(--val-red); border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.8);">
        <h4 style="color: var(--val-white); margin-top: 0; text-align: center;">ALIGN COSTUME</h4>
        
        <label style="color: var(--val-white); font-size: 12px;">Width (Shrink / Expand)</label>
        <input type="range" id="sliderScaleX" min="0.5" max="2.5" step="0.05" value="1" style="width: 100%; margin-bottom: 15px;">
        
        <label style="color: var(--val-white); font-size: 12px;">Height (Shrink / Expand)</label>
        <input type="range" id="sliderScaleY" min="0.5" max="2.5" step="0.05" value="1" style="width: 100%; margin-bottom: 15px;">
        
        <label style="color: var(--val-white); font-size: 12px;">Up / Down</label>
        <input type="range" id="sliderY" min="-1" max="1" step="0.05" value="0" style="width: 100%; margin-bottom: 15px;">
        
        <label style="color: var(--val-white); font-size: 12px;">Left / Right</label>
        <input type="range" id="sliderX" min="-1" max="1" step="0.05" value="0" style="width: 100%; margin-bottom: 15px;">
        
        <label style="color: var(--val-white); font-size: 12px; color: var(--val-red);">Eyes Cutout Size</label>
        <input type="range" id="sliderEyes" min="0.5" max="3.0" step="0.05" value="1.35" style="width: 100%; margin-bottom: 15px;">
        
        <label style="color: var(--val-white); font-size: 12px; color: var(--val-red);">Mouth Cutout Size</label>
        <input type="range" id="sliderMouth" min="0.5" max="3.0" step="0.05" value="1.15" style="width: 100%; margin-bottom: 15px;">
        
        <button id="closeCalibrationBtn" class="val-btn primary" style="width: 100%; padding: 10px;">DONE</button>
    </div>

    <div class="container" style="padding: 10px; padding-bottom: 140px;">
        <video class="input_video" playsinline></video>
        
        <!-- Canvas to draw the filter -->
        <canvas class="output_canvas" width="1080" height="1080" style="margin: 0 auto; display: block;"></canvas>

        <div class="mobile-bottom-bar">
            <h3 id="connectionStatus" class="status disconnected" style="margin: 0 0 10px 0; font-size: 16px;">DISCONNECTED</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="toggleFilterBtn" class="val-btn primary" style="padding: 12px 2px; font-size: 12px;">FILTER (ON)</button>
                <div style="display: flex; gap: 5px;">
                    <button id="switchOutfitBtn" class="val-btn secondary" style="flex: 3; padding: 12px 2px; font-size: 12px;">OUTFIT: BASE</button>
                    <button id="alignBtn" class="val-btn secondary" style="flex: 1; padding: 12px 2px; font-size: 16px;" title="Align Costume">⚙️</button>
                </div>
                <button id="switchBgBtn" class="val-btn secondary" style="grid-column: span 2; padding: 12px 2px; font-size: 12px;">BG: NONE</button>
            </div>
            
            <button id="connectBtn" class="val-btn" style="width: 100%; margin-top: 10px; padding: 15px; font-size: 14px;">CONNECT TO OBS</button>
        </div>
    </div>

    <!-- Load our script last -->
    <script src="mobile.js"></script>
</body>
</html>
